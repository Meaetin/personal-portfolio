<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" preserveAspectRatio="none">
  <defs>
    <!-- monochrome TV snow: high-frequency noise averaged to grey, contrast
         pushed toward black/white, alpha forced opaque so it reads as a full
         speckle field rather than a faint haze -->
    <filter id="tv-snow" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="11" stitchTiles="stitch"/>
      <feColorMatrix type="matrix"
        values="0.33 0.33 0.33 0 0
                0.33 0.33 0.33 0 0
                0.33 0.33 0.33 0 0
                0    0    0    0 1"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="2.2" intercept="-0.55"/>
        <feFuncG type="linear" slope="2.2" intercept="-0.55"/>
        <feFuncB type="linear" slope="2.2" intercept="-0.55"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="256" height="256" filter="url(#tv-snow)"/>
</svg>
