<svg xmlns="http://www.w3.org/2000/svg" width="350" height="90" viewBox="0 0 350 90" preserveAspectRatio="none">
  <defs>
    <!-- hard-edged SMPTE-style colour bars: no smooth blending = blocky TV look -->
    <linearGradient id="tv-colour-bars" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"        stop-color="#c0c0c0"/>
      <stop offset="0.142857" stop-color="#c0c0c0"/>
      <stop offset="0.142857" stop-color="#cccc00"/>
      <stop offset="0.285714" stop-color="#cccc00"/>
      <stop offset="0.285714" stop-color="#00cccc"/>
      <stop offset="0.428571" stop-color="#00cccc"/>
      <stop offset="0.428571" stop-color="#00bb00"/>
      <stop offset="0.571428" stop-color="#00bb00"/>
      <stop offset="0.571428" stop-color="#cc00cc"/>
      <stop offset="0.714285" stop-color="#cc00cc"/>
      <stop offset="0.714285" stop-color="#cc0000"/>
      <stop offset="0.857142" stop-color="#cc0000"/>
      <stop offset="0.857142" stop-color="#0000cc"/>
      <stop offset="1"        stop-color="#0000cc"/>
    </linearGradient>

    <!-- coarse, high-contrast chromatic speckle: independent noise per RGB channel
         pushed to near-pure primaries, alpha forced opaque -->
    <filter id="tv-static" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="2" seed="7" stitchTiles="stitch"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="4" intercept="-1.5"/>
        <feFuncG type="linear" slope="4" intercept="-1.5"/>
        <feFuncB type="linear" slope="4" intercept="-1.5"/>
        <feFuncA type="linear" slope="0" intercept="1"/>
      </feComponentTransfer>
    </filter>

    <!-- the same vivid speckle but with a noise-thresholded alpha, so ~40% of
         pixels are opaque random primaries that overwrite the bar underneath —
         this is what punches multicolour dead-pixels into every region -->
    <filter id="tv-speckle" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" seed="42" stitchTiles="stitch"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="4" intercept="-1.5"/>
        <feFuncG type="linear" slope="4" intercept="-1.5"/>
        <feFuncB type="linear" slope="4" intercept="-1.5"/>
        <feFuncA type="discrete" tableValues="0 0 0 1 1"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <!-- colour-bar base -->
  <rect width="350" height="90" fill="url(#tv-colour-bars)"/>
  <!-- heavy chromatic static; each bar's hue tints the speckle within its luminance -->
  <rect width="350" height="90" filter="url(#tv-static)" style="mix-blend-mode:overlay"/>
  <rect width="350" height="90" filter="url(#tv-static)" style="mix-blend-mode:soft-light" opacity="0.9"/>
  <!-- random pure-colour pixels punched over the top so even saturated bars read
       as a corrupted signal rather than a clean rainbow -->
  <rect width="350" height="90" filter="url(#tv-speckle)"/>
</svg>
